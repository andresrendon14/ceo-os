<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Los Parceritos | CEO Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">
    <header class="flex justify-between items-center mb-4 glass p-4 rounded-xl">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-600 rounded-lg"><i class="fas fa-rocket text-white"></i></div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">LOS PARCERITOS <span class="text-blue-400 font-light">CEO-OS</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Antigravity Execution Engine</p>
            </div>
        </div>
        <div class="flex gap-6 text-xs font-medium">
            <div class="flex flex-col items-end">
                <span class="text-slate-500">OPENCLAW</span>
                <span class="text-green-400"><span class="status-dot bg-green-500 animate-pulse mr-1"></span>READY</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col gap-4 overflow-hidden">
        <div class="flex-grow glass rounded-xl p-6 overflow-y-auto space-y-4" id="chat-box">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs">AI</div>
                <div class="bg-slate-800/50 p-4 rounded-2xl rounded-tl-none max-w-xl text-sm">
                    Andrés, sistema de puente activado. Escribe una orden técnica para que OpenClaw la ejecute en tu PC.
                </div>
            </div>
        </div>

        <div class="glass p-2 rounded-2xl flex items-center gap-3">
            <div class="pl-4 text-blue-500"><i class="fas fa-terminal text-sm"></i></div>
            <input type="text" id="cmd-input" placeholder="Ej: Crea un archivo contacto.html..." class="bg-transparent flex-grow p-4 outline-none text-sm font-medium">
            <button onclick="sendCommand()" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold text-xs transition-all tracking-widest">EJECUTAR</button>
        </div>
    </main>

    <script>
        async function sendCommand() {
            const input = document.getElementById('cmd-input');
            const chat = document.getElementById('chat-box');
            const val = input.value;
            if(!val) return;

            chat.innerHTML += \<div class="flex gap-3 justify-end"><div class="bg-blue-600/20 border border-blue-500/30 p-4 rounded-2xl max-w-xl text-right text-sm text-blue-100 uppercase font-mono">\</div></div>\;
            input.value = '';

            try {
                const response = await fetch('https://ceo-os-weld.vercel.app/api/enviar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({instruccion: val})
                });
                const data = await response.json();
                console.log('API Response:', data);
            } catch (e) {
                console.error('Error enviando a la API:', e);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
